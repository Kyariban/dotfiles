format = "$username $directory $git_branch$fill $time\n  [уұһӘ](fg:arrow) "
palette = "everforest"

[palettes.rosepine]
overlay = '#393552'
time = '#ea9a97'
repo = '#3e8fb0'
gitbranch = '#9ccfd8'
username = '#c4a7e7'
arrow= '#c4a7e7'

[palettes.everforest]
overlay = '#3D484D'
time = '#7FBBB3'
repo = '#A7C080'
gitbranch = '#83C092'
username = '#dbbc7f'
arrow='#d3c6aa'

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:repo"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:gitbranch"
symbol = "пҗҳ"

[time]
disabled = false
format = "[оӮ¶](fg:overlay)[ $time ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:time"
time_format = "%H:%M"

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ у°§ұ $user ]($style)[оӮҙ](fg:overlay)"
show_always = true
style_root = "bg:overlay fg:username"
style_user = "bg:overlay fg:username"
