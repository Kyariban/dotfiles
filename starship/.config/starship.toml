format = "$username $directory $git_branch$fill $time\n  [уұһӘ](fg:iris) "
palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[time]
disabled = false
format = "[оӮ¶](fg:overlay)[ $time ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%H:%M"

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ у°§ұ Kyari ]($style)[оӮҙ](fg:overlay)"
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"
